name: Deploy OCR to Repositories

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: |
          Repository to target (leave empty for all repos in the org).
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Deploy OCR workflow
        env:
          GH_TOKEN: ${{ secrets.PROPAGATION_TOKEN }}
          REPO_NAME: ${{ github.event.inputs.repo_name }}
          ORG: ${{ github.repository_owner }}
        run: |
          # Fetch the canonical propagate script from .github repo
          gh api "repos/$ORG/.github/contents/scripts/propagate-files.sh" \
            --jq .content | base64 -d > /tmp/propagate-files.sh
          chmod +x /tmp/propagate-files.sh

          if [ -n "$REPO_NAME" ]; then
            bash /tmp/propagate-files.sh \
              --source workflows/ocr-review.yml \
              --destination .github/workflows/ocr-review.yml \
              --repo "$REPO_NAME" \
              --exclude community-code-review \
              --message "Add automated code review workflow"
          else
            bash /tmp/propagate-files.sh \
              --source workflows/ocr-review.yml \
              --destination .github/workflows/ocr-review.yml \
              --all \
              --exclude community-code-review \
              --message "Add automated code review workflow"
          fi
